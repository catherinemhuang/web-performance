<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAME — Enter the Game</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.9/Tone.js" integrity="sha512-nUjml8mN4CNYqBAy0ndDrd8pJV/eTtBNDsnvNtPqozx9/BccUeWSoKW14qWkQUnhuh8E3m+yra3qdzM68lqPEQ==" crossorigin="anonymous"></script>
</head>

<body>

<div id="cursor"></div>

<div id="p5-canvas-container"></div>

<audio id="bg-audio" src="AlienPlanet.mp3" loop preload="auto"></audio>

<button id="mute-btn" title="Toggle music">
  <svg id="icon-sound" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
    <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
    <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
  </svg>
  <svg id="icon-mute" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
    <line x1="23" y1="9" x2="17" y2="15"></line>
    <line x1="17" y1="9" x2="23" y2="15"></line>
  </svg>
</button>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="coord tl" id="coord-tl">00.000 / 00.000</div>
<div class="coord br">V1.0</div>

<div id="ui">
  <div class="title-wrap">
  </div>
  <div class="field-wrap">
    <label class="field-label">Enter your identity</label>
    <div class="dot-input-container">
      <canvas class="dots-canvas" id="input-dots"></canvas>
      <input id="name-input" type="text" maxlength="16">
      <div id="name-display"></div>
    </div>
  </div>

  <div class="btn-wrap">
    <canvas class="dots-canvas" id="btn-dots"></canvas>
    <button id="start-btn">LET'S START</button>
  </div>
</div>

<div id="welcome">
  <div id="welcome-text"></div>
    <div class="btn-wrap">
    <canvas class="dots-canvas" id="btn-dots"></canvas>
    <button id="start-btn1">LET'S GO!</button>
  </div>
</div>

<!-- JS FILES -->
<script src="main.js"></script>
<script src="sketch.js"></script>

</body>
</html>
